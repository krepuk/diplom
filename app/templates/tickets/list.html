{% extends "base.html" %}
{% block content %}
<h2>Список заявок</h2>
<table class="table table-striped mt-3">
    <thead>
        <tr>
            <th>ID</th>
            <th>Тема</th>
            <th>Категория</th>
            <th>Статус</th>
            <th>Создана</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for ticket in tickets %}
        <tr>
            <td>{{ ticket.id }}</td>
            <td>{{ ticket.title }}</td>
            <td>{{ ticket.category }}</td>
            <td>
                <span class="badge 
                    {% if ticket.status == 'Новая' %}bg-danger
                    {% elif ticket.status == 'В работе' %}bg-warning text-dark
                    {% elif ticket.status == 'Решена' %}bg-info
                    {% else %}bg-success{% endif %}">
                    {{ ticket.status }}
                </span>
            </td>
            <td>{{ ticket.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
            <td><a href="{{ url_for('tickets.detail', id=ticket.id) }}" class="btn btn-sm btn-primary">Просмотр</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
